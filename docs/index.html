<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSage - Legal</title>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F5D98E;
            --dark-bg: #131211;
            --card-bg: #1a1918;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2928;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 500px;
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        
        .link-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }
        
        .link-card h2 {
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        
        .link-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0;
        }
        
        footer {
            margin-top: 60px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        @media (max-width: 600px) {
            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">CryptoSage</div>
        <p class="tagline">AI-Powered Crypto Trading</p>
        
        <div class="links">
            <a href="privacy-policy.html" class="link-card">
                <h2>Privacy Policy</h2>
                <p>Learn how we protect your data and respect your privacy.</p>
            </a>
            
            <a href="terms.html" class="link-card">
                <h2>Terms of Service</h2>
                <p>Read our terms and conditions for using CryptoSage.</p>
            </a>
        </div>
        
        <footer>
            <p>&copy; 2026 CryptoSage. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
